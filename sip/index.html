<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <title>WebRTC Softphone</title>
</head>

<body>

    <h2>Login</h2>

    <input id="extension" value="803" placeholder="Extension (801)" />
    <input id="password" type="password" value="admin@1234" placeholder="Password" />

    <button id="loginBtn">Login</button>
    <button id="login1001Btn">Login as 1001</button>
    <button id="login1002Btn">Login as 1002</button>

    <button onclick="sendDTMF('0')">0</button>
    <button onclick="sendDTMF('1')">1</button>
    <button onclick="sendDTMF('2')">2</button>
    <button onclick="sendDTMF('3')">3</button>
    <button onclick="sendDTMF('4')">4</button>
    <button onclick="sendDTMF('5')">5</button>
    <button onclick="sendDTMF('6')">6</button>
    <button onclick="sendDTMF('7')">7</button>
    <button onclick="sendDTMF('8')">8</button>
    <button onclick="sendDTMF('9')">9</button>
    <button onclick="sendDTMF('*')">*</button>
    <button onclick="sendDTMF('#')">#</button>

    <audio id="remoteAudio" autoplay></audio>

    <hr>

    <h2>Call</h2>

    <input id="target" value="800" placeholder="Extension to call (802)" />

    <button id="callBtn">Call</button>
    <button id="hangupBtn">Hangup</button>

    <div id="status">Disconnected</div>

    <script type="module" src="./index.js"></script>

</body>

</html>
