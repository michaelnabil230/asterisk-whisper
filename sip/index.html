<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <title>WebRTC Softphone</title>
</head>

<body>

    <h2>Login</h2>

    <input id="extension" value="803" placeholder="Extension (801)" />
    <input id="password" type="password" value="admin@1234" placeholder="Password" />

    <button id="loginBtn">Login</button>
    <button id="login1001Btn">Login as 1001</button>
    <button id="login1002Btn">Login as 1002</button>

    <audio id="remoteAudio" autoplay></audio>

    <hr>

    <h2>Call</h2>

    <input id="target" value="800" placeholder="Extension to call (802)" />

    <button id="callBtn">Call</button>
    <button id="hangupBtn">Hangup</button>

    <div id="status">Disconnected</div>

    <script type="module" src="./index.js"></script>

</body>

</html>
